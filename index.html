<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15以內加減2 iPad全做完對答案版</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除 iPad 點擊時的藍色陰影 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }

        .container {
            max-width: 1024px; /* 針對 iPad 最佳解析度上限 */
            margin: 0 auto;
            padding-bottom: 60px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin: 10px 0 25px 0;
            color: #2c3e50;
        }

        /* 頂部進度看板 */
        .score-board {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 20px;
            border-radius: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            text-align: center;
        }

        .score-item {
            font-size: 16px;
            font-weight: bold;
            color: #bdc3c7;
        }

        .score-item span {
            display: block;
            color: #f1c40f;
            font-size: 28px;
            margin-top: 5px;
        }

        /* 針對 iPad 螢幕的網格配置 */
        .quiz-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* iPad 橫放預設 3 欄 */
            gap: 16px;
        }

        /* 當 iPad 直放 (Portrait) 或小螢幕時切換為 2 欄 */
        @media (max-width: 768px) {
            .quiz-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 大尺寸卡片，極度適合手指觸控 */
        .quiz-item {
            background: white;
            padding: 18px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .quiz-num {
            font-size: 13px;
            color: #95a5a6;
            width: 35px;
            text-align: left;
        }

        .formula {
            font-size: 22px; /* 放大算式 */
            font-weight: 600;
            letter-spacing: 1px;
            margin-right: 12px;
            color: #2c3e50;
        }

        /* 巨大化的 iPad 專用輸入框 */
        .ans-input {
            width: 70px;
            height: 46px; /* 符合 Apple 最小觸控高度 */
            font-size: 22px;
            font-weight: bold;
            padding: 2px;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            background-color: #f8fafc;
            transition: all 0.2s;
        }
        
        .ans-input:focus {
            border-color: #3498db;
            background-color: #fff;
        }

        /* 當正在作答且有輸入內容時，框線微變深方便識別 */
        .ans-input.has-value {
            border-color: #7f8c8d;
            background-color: #fff;
        }

        .feedback {
            margin-left: 12px;
            font-weight: bold;
            font-size: 22px;
            width: 25px;
            text-align: center;
        }

        /* 送出對答案後的狀態顏色加強 */
