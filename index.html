<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15以內加減2 iPad全做完對答案版</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除 iPad 點擊時的藍色陰影 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }

        .container {
            max-width: 1024px; /* 針對 iPad 最佳解析度上限 */
            margin: 0 auto;
            padding-bottom: 60px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin: 10px 0 25px 0;
            color: #2c3e50;
        }

        /* 頂部進度看板 */
        .score-board {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 20px;
            border-radius: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            text-align: center;
        }

        .score-item {
            font-size: 16px;
            font-weight: bold;
            color: #bdc3c7;
        }

        .score-item span {
            display: block;
            color: #f1c40f;
            font-size: 28px;
            margin-top: 5px;
        }

        /* 針對 iPad 螢幕的網格配置 */
        .quiz-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* iPad 橫放預設 3 欄 */
            gap: 16px;
        }

        /* 當 iPad 直放 (Portrait) 或小螢幕時切換為 2 欄 */
        @media (max-width: 768px) {
            .quiz-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 大尺寸卡片，極度適合手指觸控 */
        .quiz-item {
            background: white;
            padding: 18px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .quiz-num {
            font-size: 13px;
            color: #95a5a6;
            width: 35px;
            text-align: left;
        }

        .formula {
            font-size: 22px; /* 放大算式 */
            font-weight: 600;
            letter-spacing: 1px;
            margin-right: 12px;
            color: #2c3e50;
        }

        /* 巨大化的 iPad 專用輸入框 */
        .ans-input {
            width: 70px;
            height: 46px; /* 符合 Apple 最小觸控高度 */
            font-size: 22px;
            font-weight: bold;
            padding: 2px;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            background-color: #f8fafc;
            transition: all 0.2s;
        }
        
        .ans-input:focus {
            border-color: #3498db;
            background-color: #fff;
        }

        /* 當正在作答且有輸入內容時，框線微變深方便識別 */
        .ans-input.has-value {
            border-color: #7f8c8d;
            background-color: #fff;
        }

        .feedback {
            margin-left: 12px;
            font-weight: bold;
            font-size: 22px;
            width: 25px;
            text-align: center;
        }

        /* 送出對答案後的狀態顏色加強 */
        .quiz-item.correct {
            border-color: #2ecc71;
            background-color: #eafaf1;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.15);
        }
        .quiz-item.correct .feedback {
            color: #2ecc71;
        }

        .quiz-item.wrong {
            border-color: #e74c3c;
            background-color: #fdedec;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.15);
        }
        .quiz-item.wrong .feedback {
            color: #e74c3c;
        }
        .quiz-item.wrong .wrong-ans {
            font-size: 13px;
            display: block;
            color: #c0392b;
            font-weight: normal;
            margin-top: 2px;
        }

        /* 底部操作按鈕區 */
        .action-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.2);
        }
        .btn-submit:active {
            background-color: #27ae60;
        }

        .btn-refresh {
            background-color: #e67e22;
            color: white;
            box-shadow: 0 6px 12px rgba(230, 126, 34, 0.2);
        }
        .btn-refresh:active {
            background-color: #d35400;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>數學線上挑戰：15 以內加減 2</h1>

        <div class="score-board">
            <div class="score-item">填寫進度<span id="answered-count">0 / 76</span></div>
            <div class="score-item">測驗得分<span id="total-score">-- 分</span></div>
        </div>

        <div class="quiz-container" id="quiz-box"></div>

        <div class="action-container">
            <button class="btn btn-submit" id="submit-btn" onclick="checkAllAnswers()">寫完了！送出對答案</button>
            <button class="btn btn-refresh" onclick="generateQuizzes()">換一套新題目</button>
        </div>
    </div>

    <script>
        const totalQuestions = 76; 
        const quizBox = document.getElementById('quiz-box');
        let correctAnswers = {};
        let isChecked = false; // 是否已經對過答案

        function generateQuizzes() {
            // 重設狀態
            quizBox.innerHTML = '';
            correctAnswers = {};
            isChecked = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').style.opacity = '1';
            document.getElementById('total-score').innerText = '-- 分';
            
            for (let i = 1; i <= totalQuestions; i++) {
                const isAddition = Math.random() < 0.5;
                let num, operator, answer;

                if (isAddition) {
                    num = Math.floor(Math.random() * 14); 
                    operator = '+';
                    answer = num + 2;
                } else {
                    num = Math.floor(Math.random() * (15 - 2 + 1)) + 2; 
                    operator = '−';
                    answer = num - 2;
                }
                
                correctAnswers[i] = answer;

                const item = document.createElement('div');
                item.className = 'quiz-item';
                item.id = `item-${i}`;

                const qNum = document.createElement('span');
                qNum.className = 'quiz-num';
                qNum.innerText = `(${i})`;

                const formula = document.createElement('span');
                formula.className = 'formula';
                formula.innerText = `${num} ${operator} 2 =`;

                const input = document.createElement('input');
                input.type = 'text'; 
                input.inputMode = 'numeric';
                input.pattern = '[0-9]*';
                input.className = 'ans-input';
                input.setAttribute('data-id', i);
                input.id = `input-${i}`;
                input.autocapitalize = 'off';
                input.autocomplete = 'off';
                input.autocorrect = 'off';
                
                // 即時監聽輸入：僅更新填寫進度，不對答案
                input.addEventListener('input', function() {
                    if (isChecked) return; // 如果對過答案了就不動
                    
                    this.value = this.value.replace(/[^0-9]/g, ''); // 限制只能輸入數字
                    
                    if (this.value.trim() !== '') {
                        this.classList.add('has-value');
                    } else {
                        this.classList.remove('has-value');
                    }
                    updateProgress();
                });

                const feedback = document.createElement('span');
                feedback.className = 'feedback';
                feedback.id = `feedback-${i}`;

                item.appendChild(qNum);
                item.appendChild(formula);
                item.appendChild(input);
                item.appendChild(feedback);
                quizBox.appendChild(item);
            }
            updateProgress();
            window.scrollTo({top: 0, behavior: 'smooth'}); 
        }

        // 更新填寫進度
        function updateProgress() {
            const inputs = document.querySelectorAll('.ans-input');
            let filledCount = 0;
            inputs.forEach(input => {
                if (input.value.trim() !== '') filledCount++;
            });
            document.getElementById('answered-count').innerText = `${filledCount} / ${totalQuestions}`;
        }

        // 一鍵對所有答案
        function checkAllAnswers() {
            const inputs = document.querySelectorAll('.ans-input');
            let unfiled = false;

            // 檢查是不是有漏寫的
            inputs.forEach(input => {
                if (input.value.trim() === '') unfiled = true;
            });

            if (unfiled) {
                const confirmSubmit = confirm('還有題目沒有寫完喔！確定要現在對答案嗎？');
                if (!confirmSubmit) return;
            }

            isChecked = true;
            let totalCorrect = 0;

            for (let i = 1; i <= totalQuestions; i++) {
                const input = document.getElementById(`input-${i}`);
                const quizItem = document.getElementById(`item-${i}`);
                const feedback = document.getElementById(`feedback-${i}`);
                const userAns = input.value.trim();

                input.disabled = true; // 對完答案後鎖定輸入框

                if (userAns !== '' && parseInt(userAns, 10) === correctAnswers[i]) {
                    quizItem.className = 'quiz-item correct';
                    feedback.innerHTML = '<div>✓</div>';
                    totalCorrect++;
                } else {
                    quizItem.className = 'quiz-item wrong';
                    feedback.innerHTML = `<div>✗</div><div class="wrong-ans">(${correctAnswers[i]})</div>`;
                }
            }

            // 計算並顯示分數
            const score = Math.round((totalCorrect / totalQuestions) * 100);
            document.getElementById('total-score').innerText = `${score} 分`;
            
            // 停用送出按鈕
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').style.opacity = '0.5';

            // 滾動回頂部看分數
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 初始化生成題目
        generateQuizzes();
    </script>
</body>
</html>
